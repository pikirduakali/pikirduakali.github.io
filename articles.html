<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles — P2X</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤨</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --background: #0e0e0e;
      --foreground: #f0ede8;
      --card: #181818;
      --muted-foreground: #7a7770;
      --accent: #e83d2a;
      --border: rgba(240, 237, 232, 0.1);
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'Bricolage Grotesque', sans-serif;
    }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { background: var(--background); color: var(--foreground); font-family: var(--font-body); line-height: 1.6; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--background); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    .page { max-width: 896px; margin: 0 auto; padding: 64px 80px; }
    .back { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted-foreground); text-decoration: none; margin-bottom: 48px; transition: color 0.2s; }
    .back:hover { color: var(--foreground); }

    h1 { font-family: var(--font-display); font-weight: 700; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: var(--muted-foreground); margin-bottom: 64px; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 48px; }
    .filter-btn { font-size: 12px; padding: 6px 14px; border: 1px solid var(--border); background: none; color: var(--muted-foreground); cursor: pointer; font-family: var(--font-body); transition: border-color 0.2s, color 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--foreground); }

    .year-group { margin-bottom: 40px; }
    .year-label { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--accent); margin-bottom: 20px; }

    .article-item { display: flex; flex-direction: column; gap: 8px; padding: 24px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: padding-left 0.2s; text-decoration: none; color: inherit; }
    .article-item:hover { padding-left: 8px; }
    .article-meta { display: flex; align-items: center; gap: 12px; }
    .article-tag { font-size: 11px; color: var(--accent); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
    .article-date { font-size: 11px; font-family: monospace; color: var(--muted-foreground); }
    .article-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; transition: color 0.2s; }
    .article-item:hover .article-title { color: var(--accent); }
    .article-excerpt { font-size: 14px; color: var(--muted-foreground); line-height: 1.7; }

    @media (max-width: 768px) { .page { padding: 48px 24px; } }
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">&larr; back to home</a>
    <h1>Articles</h1>
    <p class="subtitle">Thoughts, notes, and things I wrote down before I forgot them.</p>

    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="essay">Essay</button>
      <button class="filter-btn" data-filter="tech">Tech</button>
      <button class="filter-btn" data-filter="design">Design</button>
    </div>

    <div id="articleList"></div>
  </div>

  <script>
    const articles = [
      { tag: 'Essay', date: '26 jun 2026', title: 'This is an Example', excerpt: 'Cuma contoh doang.', year: 2026, slug: 'this-is-an-example' },
      { tag: 'Essay', date: '13 jul 2026', title: 'On Building Things That Last', excerpt: 'Most things break. The interesting question is whether that was the point.', year: 2026, slug: 'on-building-things-that-last' },
      { tag: 'Essay', date: '11 jun 2026', title: 'The Art of Doing Nothing', excerpt: 'Sometimes the most productive thing is to sit still and let your brain defrag.', year: 2026, slug: 'the-art-of-doing-nothing' },
      { tag: 'Tech', date: '28 jan 2026', title: 'The Quiet Power of Boring Infrastructure', excerpt: 'Invisible systems are the only ones worth admiring.', year: 2026, slug: 'the-quiet-power-of-boring-infrastructure' },
      { tag: 'Design', date: '5 nov 2025', title: 'Designing for Yourself First', excerpt: "If you wouldn't use it daily, you probably shouldn't ship it.", year: 2025, slug: 'designing-for-yourself-first' },
      { tag: 'Essay', date: '19 sep 2025', title: 'Why I Stopped Trying to Optimize Everything', excerpt: 'Life is messy. Your productivity system should be too.', year: 2025, slug: 'why-i-stopped-trying-to-optimize-everything' },
      { tag: 'Tech', date: '2 aug 2025', title: 'Notes on Running a One-Person Tech Stack', excerpt: 'When you are the whole IT department, you learn what actually matters.', year: 2025, slug: 'notes-on-running-a-one-person-tech-stack' },
      { tag: 'Design', date: '14 apr 2025', title: 'Good Enough is Better Than Perfect', excerpt: 'Shipping beats perfection. Every single time.', year: 2025, slug: 'good-enough-is-better-than-perfect' },
      { tag: 'Essay', date: '21 feb 2025', title: 'What Working in F&B Taught Me About People', excerpt: 'Turns out, human behavior is predictable if you watch long enough.', year: 2025, slug: 'what-working-in-fb-taught-me-about-people' },
      { tag: 'Tech', date: '7 dec 2024', title: 'My Love-Hate Relationship with Automation', excerpt: 'I automated my coffee brewing. Then I went back to manual.', year: 2024, slug: 'my-love-hate-relationship-with-automation' },
      { tag: 'Design', date: '15 oct 2024', title: 'Why Less is Still More', excerpt: 'Minimalism is not a trend. It is a constraint that forces clarity.', year: 2024, slug: 'why-less-is-still-more' },
      { tag: 'Essay', date: '3 aug 2024', title: 'On Leaving and Starting Over', excerpt: 'Every career change feels like falling. Until you land.', year: 2024, slug: 'on-leaving-and-starting-over' },
      { tag: 'Essay', date: '22 jun 2024', title: 'The Coffee Shop as a Classroom', excerpt: 'I learned more about business behind the bar than in any boardroom.', year: 2024, slug: 'the-coffee-shop-as-a-classroom' },
    ];

    let currentFilter = 'all';
    const listEl = document.getElementById('articleList');
    const filterBtns = document.querySelectorAll('.filter-btn');

    function render() {
      const filtered = currentFilter === 'all' ? articles : articles.filter(a => a.tag.toLowerCase() === currentFilter);
      const groups = {};
      filtered.forEach(a => {
        if (!groups[a.year]) groups[a.year] = [];
        groups[a.year].push(a);
      });

      listEl.innerHTML = '';
      Object.keys(groups).sort((a, b) => b - a).forEach(year => {
        const group = document.createElement('div');
        group.className = 'year-group';
        group.innerHTML = `<div class="year-label">${year}</div>`;
        groups[year].forEach(a => {
          const item = document.createElement('a');
          item.className = 'article-item';
          item.href = `article.html?slug=${a.slug}`;
          item.innerHTML = `
            <div class="article-meta">
              <span class="article-tag">${a.tag}</span>
              <span class="article-date">${a.date}</span>
            </div>
            <div class="article-title">${a.title}</div>
            <div class="article-excerpt">${a.excerpt}</div>`;
          group.appendChild(item);
        });
        listEl.appendChild(group);
      });
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });

    render();
  </script>
</body>
</html>
